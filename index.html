<!DOCTYPE html>
<html>

<head>

  <script src="https://cdn.jsdelivr.net/npm/js-beautify/js/lib/beautify.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-beautify/js/lib/beautify-css.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-beautify/js/lib/beautify-html.js"></script>

  
<link rel="icon" type="image/svg+xml" sizes="any" href="https://files.catbox.moe/76k7z3.svg">



  <title>EDITOR</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #0d1117;
      display: flex;
      flex-direction: column;
    }

    #container {
      padding: 10px;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #title {
      color: #fff9;
      font-family: arial;
      font-size: 25px;
      font-weight: 500;
    }

    #toolbar {
      height: fit-content;
      padding: 7px;
      display: flex;
      gap: 15px;
      justify-content: center;
      background-color: #010409;
      border: 2px solid #3e3e3e;
      border-radius: 5px;
    }

    #toolbar div {
      height: 30px;
      aspect-ratio: 1;
      background-color: #fff2;
      border: 1px solid #fff2;
      border-radius: 3px;
      cursor: pointer;
    }

    #toolbar div:active {
      opacity: 80%;
    }

    #toolbar div::after {
      display: block;
      width: 100%;
      height: 100%;
      content: "";
      filter: invert(100%);
      background-position: center;
      background-repeat: no-repeat;
      opacity: 40%;
    }

    #save::after {
      background-image: url("https://cdn-icons-png.flaticon.com/64/9147/9147708.png");
      background-size: 70%;
    }

    #pretty::after {
      background-image: url("https://cdn-icons-png.flaticon.com/64/764/764690.png");
      background-size: 50%;
    }

    #size::after {
      background-image: url("https://cdn-icons-png.flaticon.com/64/2087/2087807.png");
      background-size: 50%;
    }

    #copy::after {
      background-image: url("https://cdn-icons-png.flaticon.com/64/5859/5859288.png");
      background-size: 60%;
    }

    #run::after {
      background-image: url("https://cdn-icons-png.flaticon.com/64/27/27223.png");
      background-size: 50%;
    }


    #sizeBar {
      background-color: #010409;
      border: 2px solid #3e3e3e;
      border-radius: 5px;
      display: none;
      gap: 8px;
      padding: 8px 10px;
    }

    #sizeRange {
      flex: 1;
    }

    #sizeValue {
      color: #fff9;
      font-family: arial;

    }




    #pree {
      width: 100%;
      height: 100%;
      overflow: auto;
      background: #0d1117;
      margin: 0;
      padding: 0;
      display: flex;
      font-size: 10px;
    }

    code {
      width: 100%;
      max-width: 100%;
      display: block;
      outline: none;
      border: 2px solid #3e3e3e;
      border-radius: 5px;
      padding: 10px 15px;
      overflow-y: auto;
    }

    ::selection {
      background: #333;
    }

    @media (hover:hover) {
      #toolbar div:hover {
        background-color: #fff3;
      }
    }
  </style>
</head>

<body>

  <div id="container">

    <p id="title">EDITOR</p>


    <div id="toolbar">
      <div id="save"></div>
      <div id="pretty"></div>
      <div id="size"></div>
      <div id="copy"></div>
      <div id="run"></div>
    </div>

    <div id="sizeBar">
      <input type="range" min="0" max="10" value="5" id="sizeRange">
      <p id="sizeValue">10px</p>
    </div>

    <pre id="pree"><code contenteditable="true" autocapitalize="none" class="language-javascript" id="code"></code></pre>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

  <script>
    const code = document.getElementById("code");
    
    let timer = null;
    
    function getCaretIndex(el) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return 0;
    
      const range = sel.getRangeAt(0);
      const pre = range.cloneRange();
    
      pre.selectNodeContents(el);
      pre.setEnd(range.startContainer, range.startOffset);
    
      return pre.toString().length;
    }
    
    
    function setCaretIndex(el, index) {
      const sel = window.getSelection();
      const range = document.createRange();
    
      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
    
      let node, pos = 0;
    
      while ((node = walker.nextNode())) {
        const next = pos + node.textContent.length;
    
        if (index <= next) {
          range.setStart(node, index - pos);
          range.collapse(true);
          break;
        }
    
        pos = next;
      }
    
      sel.removeAllRanges();
      sel.addRange(range);
    }
    
    
    function highlight() {
      const text = code.textContent;
      const caret = getCaretIndex(code);
    
      code.innerHTML = Prism.highlight(
        text,
        Prism.languages.javascript,
        "javascript"
      );
    
      requestAnimationFrame(() => {
        setCaretIndex(code, caret);
      });
    }
    
    
    code.addEventListener("input", () => {
      clearTimeout(timer);
    
      timer = setTimeout(() => {
        highlight();
    
      }, 400);
    });
  </script>

  <script>
    save.onclick = () => {
      const name = prompt("Name your file:", "index");
    
      if (!name) return;
    
      const content = code.textContent;
      const blob = new Blob([content], {
        type: "text/html"
      });
      const url = URL.createObjectURL(blob);
    
      const a = document.createElement("a");
      a.href = url;
      a.download = name.endsWith(".html") ? name : name + ".html";
      a.click();
    
      URL.revokeObjectURL(url);
    };
    
    pretty.onclick = () => {
      try {
        const formatted = html_beautify(code.textContent, {
          indent_size: 2,
          indent_with_tabs: false,
          preserve_newlines: true,
        });
        code.textContent = formatted;
    highlight();
      } catch (e) {
        alert("ERR: " + e.message);
    
      }
    };
    
    size.onclick = () => {
      sizeBar.style.display =
        getComputedStyle(sizeBar).display === "none" ? "flex" : "none";
    };
    
    copy.onclick = () => {
      try {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(code.textContent);
          alert("Code copied!");
        } else {
          alert("Clipboard API not supported in this browser.");
        };
      } catch (e) {
        alert("ERR: " + e.message);
      }
    };
    
    run.onclick = () => {
      const blob = new Blob([code.textContent], {
        type: "text/html"
      });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
    };
  </script>
